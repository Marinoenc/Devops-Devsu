services:
  app:
    build: .
    image: demo-devops-nodejs:local
    container_name: demo-devops-nodejs
    ports:
      - "8000:8000"
    environment:
      PORT: 8000
      DATABASE_NAME: /app/data/dev.sqlite
      DATABASE_USER: user
      DATABASE_PASSWORD: password
    volumes:
      - app-data:/app/data
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
volumes:
  app-data:
